<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor - Cinemax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #e50914; 
            --bg: #0a0a0a; 
            --card-bg: #1f1f1f; 
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }

        /* HEADER CON SLIDESHOW */
        .media-header { position: relative; width: 100%; height: 45vh; background: #000; overflow: hidden; }
        .media-header img { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* Transición suave entre imágenes */
        }
        .media-header img.active { opacity: 1; }
        
        .header-shadow { 
            position: absolute; bottom: 0; width: 100%; height: 100%; 
            background: linear-gradient(0deg, var(--bg) 5%, transparent 70%, rgba(0,0,0,0.4) 100%); 
            z-index: 2;
        }
        .back-nav { position: absolute; top: 20px; left: 20px; z-index: 10; color: #fff; font-size: 24px; text-decoration: none; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        /* CONTENIDO PRINCIPAL */
        .content { padding: 0 20px 100px; margin-top: -40px; position: relative; z-index: 5; }
        .title { font-size: 28px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .meta { display: flex; gap: 8px; margin-bottom: 20px; }
        .meta span { background: #252525; padding: 4px 10px; border-radius: 4px; font-size: 12px; color: #ccc; }
        .synopsis { font-size: 14px; color: #b3b3b3; line-height: 1.5; margin-bottom: 30px; }

        .section-label { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        /* LISTA DE EPISODIOS (SOLO TEXTO) */
        .episode-card {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card-bg);
            padding: 16px 20px; border-radius: 8px; margin-bottom: 10px; cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .episode-card:active { transform: scale(0.98); background: #2a2a2a; }
        .ep-info { font-size: 15px; font-weight: 600; color: #eee; }
        .ep-icon { color: var(--accent); font-size: 14px; }

        /* RECOMENDADOS */
        .related-section { margin-top: 35px; }
        .related-grid { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        .related-grid::-webkit-scrollbar { display: none; }
        .related-item { flex-shrink: 0; width: 130px; cursor: pointer; }
        .related-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .related-item p { font-size: 11px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; text-align: center; }

        /* MENU INFERIOR */
        .bottom-menu { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; padding: 12px 0; 
            z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .menu-item { text-decoration: none; color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 25%; }
        .menu-item i { font-size: 19px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent); }

        /* REPRODUCTOR */
        .video-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        .video-player.active { display: flex; align-items: center; justify-content: center; }
        .close-v { 
            position: absolute; top: 25px; left: 20px; z-index: 10000; 
            background: rgba(255,255,255,0.2); border:none; color:#fff; 
            width:45px; height:45px; border-radius:50%; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="main-view">
    <div class="media-header" id="bg-container">
        <a href="index.html" class="back-nav"><i class="fas fa-arrow-left"></i></a>
        <div class="header-shadow"></div>
    </div>

    <div class="content">
        <h1 class="title" id="item-title">Cargando...</h1>
        <div class="meta" id="item-meta"></div>
        <p class="synopsis" id="item-desc"></p>

        <div class="section-label">Episodios</div>
        <div id="episodes-list"></div>

        <div class="related-section">
            <div class="section-label">Hentais que te podrían gustar</div>
            <div class="related-grid" id="related-grid"></div>
        </div>
    </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="hentais.html" class="menu-item"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
    <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sincensura</span></a>
    <a href="#" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<div class="video-player" id="player">
    <button class="close-v" onclick="stopVideo()"><i class="fas fa-times"></i></button>
    <iframe id="video-frame" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="hentaibase.js"></script>
<script>
    const urlId = localStorage.getItem('hentai_id');
    const item = baseDeDatos.find(h => h.id === urlId);

    if(item) {
        document.title = item.titulo + " - Cinemax";
        document.getElementById("item-title").innerText = item.titulo;
        document.getElementById("item-desc").innerText = item.descripcion;
        
        // --- LÓGICA DEL SLIDESHOW ---
        const bgContainer = document.getElementById("bg-container");
        const imagenesBG = (item.bg && item.bg.length > 0) ? item.bg : [item.poster];
        
        // Crear elementos de imagen
        imagenesBG.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            if(index === 0) img.classList.add('active');
            bgContainer.appendChild(img);
        });

        // Función para cambiar imagen cada 5 segundos
        let currentImgIndex = 0;
        const imgs = bgContainer.querySelectorAll('img');
        if(imgs.length > 1) {
            setInterval(() => {
                imgs[currentImgIndex].classList.remove('active');
                currentImgIndex = (currentImgIndex + 1) % imgs.length;
                imgs[currentImgIndex].classList.add('active');
            }, 5000); // 5 segundos es un tiempo cómodo
        }

        document.getElementById("item-meta").innerHTML = `
            <span>${item.fecha}</span>
            <span>${item.estudio}</span>
            <span style="color:var(--accent); font-weight:bold">${item.tipo.toUpperCase()}</span>
        `;

        // --- LÓGICA DE EPISODIOS (SOLO TEXTO) ---
        const list = document.getElementById("episodes-list");
        const videos = Array.isArray(item.video) ? item.video : [item.video];
        
        videos.forEach((link, index) => {
            list.innerHTML += `
                <div class="episode-card" onclick="playVideo('${link}')">
                    <div class="ep-info">Episodio ${index + 1}</div>
                    <div class="ep-icon"><i class="fas fa-play-circle"></i></div>
                </div>
            `;
        });

        cargarRecomendados();
    }

    function cargarRecomendados() {
        const grid = document.getElementById("related-grid");
        const filtrados = baseDeDatos.filter(h => h.id !== urlId);
        const randoms = filtrados.sort(() => 0.5 - Math.random()).slice(0, 5);

        randoms.forEach(h => {
            const relCard = document.createElement("div");
            relCard.className = "related-item";
            relCard.onclick = () => {
                localStorage.setItem('hentai_id', h.id);
                window.location.reload(); 
            };
            relCard.innerHTML = `
                <img src="${h.poster}">
                <p>${h.titulo}</p>
            `;
            grid.appendChild(relCard);
        });
    }

    function playVideo(url) {
        const p = document.getElementById("player");
        document.getElementById("video-frame").src = url;
        p.style.display = "flex";
        p.classList.add("active");
        document.body.style.overflow = "hidden";
    }

    function stopVideo() {
        const p = document.getElementById("player");
        document.getElementById("video-frame").src = "";
        p.style.display = "none";
        p.classList.remove("active");
        document.body.style.overflow = "auto";
    }
</script>

</body>
</html>
