<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentai - Cinemax</title>
    <style>
        :root { --bg-color: #141414; --accent-color: #E50914; --skeleton-bg: #222; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family: Arial, sans-serif; background: var(--bg-color); color: #fff; padding-bottom: 100px; }
        .container { padding: 20px 15px; }
        .page-header { border-left: 4px solid var(--accent-color); padding-left: 10px; text-transform: uppercase; margin-bottom: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .anime-card { position: relative; background: var(--skeleton-bg); border-radius: 4px; overflow: hidden; aspect-ratio: 2 / 3; cursor: pointer; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; padding: 20px; }
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .bottom-menu { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .menu-item { color: #888; text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; background: none; border: none; }
        .menu-item.active { color: var(--accent-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="modal-busqueda">
    <button onclick="cerrarBuscador()" style="color:white; background:none; border:none; font-size:30px;">&times;</button>
    <input type="text" id="input-buscador" placeholder="Buscar censurados..." style="width:100%; padding:10px; margin-top:10px;">
    <div id="resultados-busqueda"></div>
</div>
<div class="container">
    <h2 class="page-header">Catálogo Censurado</h2>
    <div class="anime-grid" id="anime-grid"></div>
</div>
<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="hentais.html" class="menu-item active"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
    <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sincensura</span></a> 
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>
<script src="hentaibase.js"></script>
<script>
function cargarCatalogo() {
    const grid = document.getElementById("anime-grid");
    if (typeof baseDeDatos === 'undefined') return;
    // FILTRO ESTRICTO
    const filtrados = baseDeDatos.filter(h => h.tipo === "censurado" || h.tipo === "sensurado");
    grid.innerHTML = filtrados.map(h => `
        <div class="anime-card" onclick="abrirDetalles('${h.id}')">
            <img src="${h.poster}" onload="this.style.opacity=1" loading="lazy">
        </div>
    `).join("");
}
function abrirDetalles(id) { localStorage.setItem('hentai_id', id); window.location.href = "playhentai.html"; }
function abrirBuscador() { document.getElementById('modal-busqueda').style.display = 'block'; }
function cerrarBuscador() { document.getElementById('modal-busqueda').style.display = 'none'; }
document.getElementById('input-buscador').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase();
    const resultadosDiv = document.getElementById('resultados-busqueda');
    resultadosDiv.innerHTML = "";
    if (texto.length < 2) return;
    const filtrados = baseDeDatos.filter(h => (h.tipo === "censurado" || h.tipo === "sensurado") && h.titulo.toLowerCase().includes(texto));
    filtrados.forEach(h => {
        const item = document.createElement('div');
        item.className = 'anime-card';
        item.onclick = () => abrirDetalles(h.id);
        item.innerHTML = `<img src="${h.poster}" style="opacity:1"><p style="font-size:8px; text-align:center;">${h.titulo}</p>`;
        resultadosDiv.appendChild(item);
    });
});
document.addEventListener("DOMContentLoaded", cargarCatalogo);
</script>
</body>
</html>
