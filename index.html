<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokigamih - Hentai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }
        
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); overflow-x:hidden; -webkit-tap-highlight-color: transparent; }
        
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        
        .container { width:100%; padding-bottom:100px; padding-top: 60px; } 
        
        /* HEADER */
        header { 
            display: flex; justify-content: center; align-items: center; 
            padding: 15px 20px; background: rgba(20, 20, 20, 0.9); 
            position: fixed; top: 0; width: 100%; z-index: 100; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        header h1 { font-size: 26px; color: var(--accent-color); font-weight: 900; letter-spacing: -1px; text-transform: uppercase; font-family: 'Arial Black', sans-serif;}

        /* MODAL DE BÚSQUEDA */
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(20, 20, 20, 0.98); z-index: 2000; padding: 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .search-box-modal { background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; padding: 12px 15px; margin-top: 60px; }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; }
        .close-search { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--text-color-sec); cursor: pointer; border: none; background: none; }
        
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .res-item { background: var(--bg-color-alt); border-radius: 4px; overflow: hidden; aspect-ratio: 2/3; position: relative; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .res-item img { width: 100%; height: 100%; object-fit: cover; }
        .res-title { position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.7); color: #fff; font-size: 9px; text-align: center; padding: 3px 0; font-weight: bold;}

        /* HERO CAROUSEL */
        .hero-carousel { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            width: 100%; 
            height: 60vh; 
            background: #000; 
        }
        .hero-carousel::-webkit-scrollbar { display: none; }
        .hero-item { flex: 0 0 100%; scroll-snap-align: start; position: relative; height: 100%; }
        .hero-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; }
        .hero-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, var(--bg-color), transparent 70%, rgba(0,0,0,0.5)); }
        
        .hero-content { position: absolute; bottom: 30px; width: 100%; padding: 0 20px; z-index: 5; text-align: left; }
        .hero-content h2 { font-size: 26px; font-weight: 500; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-family: 'Georgia', serif; letter-spacing: 0.5px; }
        .hero-content button { background: var(--accent-color); color: #fff; border: none; padding: 10px 20px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; text-transform: uppercase;}
        
        .section { margin: 25px 0; padding-left: 15px; }
        .section h2 { font-size: 17px; margin-bottom: 12px; font-weight: 700; color: var(--text-color); }

        .scroll-row { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 12px; scrollbar-width: none; padding-right: 20px; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .card-item { flex-shrink: 0; cursor: pointer; transition: transform 0.2s; position: relative; }
        .card-item:active { transform: scale(0.95); }
        
        /* MENU INFERIOR UNIFICADO */
        .bottom-menu { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(0, 0, 0, 0.98); 
            backdrop-filter: blur(20px); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            z-index: 1000; 
            border-top: 1px solid rgba(255, 255, 255, 0.03); 
        }
        .menu-item { 
            text-decoration: none; 
            color: #888; 
            font-size: 10px; 
            font-weight: 500; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: none; 
            border: none; 
            cursor: pointer; 
            width: 25%; 
        }
        .menu-item i { font-size: 19px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

    <header>
        <h1>Kokigamih</h1>
    </header>

    <div id="modal-busqueda">
        <button class="close-search" onclick="cerrarBuscador()"><i class="fas fa-times"></i></button>
        <div class="search-box-modal">
            <i class="fas fa-search" style="margin-right: 15px; color: #888;"></i>
            <input type="text" id="input-buscador" placeholder="Buscar título o etiqueta...">
        </div>
        <div id="resultados-busqueda"></div>
    </div>

    <div class="container">
        <div class="hero-carousel" id="hero-carousel"></div>

        <div class="section">
            <h2>Agregados recientes</h2>
            <div class="scroll-row" id="row-recientes"></div>
        </div>

        <div class="section">
            <h2>Hentais más vistos</h2>
            <div class="scroll-row" id="row-mas-vistos"></div>
        </div>

        <div class="section">
            <h2>Hentais sin censura</h2>
            <div class="scroll-row" id="row-sincensura"></div>
        </div>
    </div>

    <nav class="bottom-menu">
        <a href="index.html" class="menu-item active"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="hentais.html" class="menu-item"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
        <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sincensura</span></a>
        <button onclick="abrirBuscador()" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></button>
    </nav>

    <script src="hentaibase.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof baseDeDatos !== 'undefined') {
                window.db = baseDeDatos;
                cargarInicio();
            } else {
                setTimeout(() => {
                    if (typeof baseDeDatos !== 'undefined') {
                        window.db = baseDeDatos;
                        cargarInicio();
                    }
                }, 500);
            }
        });

        function cargarInicio() {
            const heroCarousel = document.getElementById('hero-carousel');
            const heroItems = [...window.db].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            heroItems.forEach(item => {
                const slide = document.createElement('div');
                slide.className = 'hero-item';
                slide.innerHTML = `
                    <img src="${item.bg || item.poster}" onload="this.style.opacity='0.8'" loading="lazy">
                    <div class="hero-content">
                        <h2>${item.titulo}</h2>
                        <button onclick="abrirReproductor('${item.id}')">
                            <i class="fas fa-play"></i> VER HENTAI
                        </button>
                    </div>
                `;
                heroCarousel.appendChild(slide);
            });

            const rowRecientes = document.getElementById('row-recientes');
            const recientes = [...window.db].reverse().slice(0, 10);
            recientes.forEach(item => rowRecientes.appendChild(crearCardHorizontal(item)));

            const rowMasVistos = document.getElementById('row-mas-vistos');
            const masVistos = [...window.db].sort(() => 0.5 - Math.random()).slice(0, 5);
            masVistos.forEach(item => rowMasVistos.appendChild(crearCardVertical(item)));

            const rowSincensura = document.getElementById('row-sincensura');
            const sinCensura = window.db.filter(item => item.tipo === 'sincensura' || (item.tags && item.tags.map(t => t.toLowerCase()).includes('sincensura')));
            sinCensura.forEach(item => rowSincensura.appendChild(crearCardVertical(item)));

            configurarBuscador();
        }

        function crearCardHorizontal(item) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.style.width = '200px'; 
            card.onclick = () => abrirReproductor(item.id);
            card.innerHTML = `
                <div style="width: 100%; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; position: relative;" class="skeleton">
                    <img src="${item.bg || item.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s;">
                </div>
                <p style="font-size: 11px; margin-top: 5px; text-align: center; color: var(--text-color-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.titulo}</p>
            `;
            return card;
        }

        function crearCardVertical(item) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.style.width = '120px';
            card.onclick = () => abrirReproductor(item.id);
            card.innerHTML = `
                <div style="width: 100%; aspect-ratio: 2/3; border-radius: 6px; overflow: hidden; position: relative;" class="skeleton">
                    <img src="${item.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s;">
                </div>
                <p style="font-size: 11px; margin-top: 5px; text-align: center; color: var(--text-color-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.titulo}</p>
            `;
            return card;
        }

        function abrirReproductor(id) {
            localStorage.setItem('hentai_id', id);
            window.location.href = "playhentai.html";
        }

        function abrirBuscador() {
            document.getElementById('modal-busqueda').style.display = 'block';
            document.getElementById('input-buscador').focus();
        }

        function cerrarBuscador() {
            document.getElementById('modal-busqueda').style.display = 'none';
        }

        function configurarBuscador() {
            const buscador = document.getElementById('input-buscador');
            buscador.addEventListener('input', (e) => {
                const texto = e.target.value.toLowerCase().trim();
                const resultadosDiv = document.getElementById('resultados-busqueda');
                resultadosDiv.innerHTML = "";
                if (texto.length < 2) return;

                const filtrados = window.db.filter(item => 
                    item.titulo.toLowerCase().includes(texto) || 
                    (item.tags && item.tags.some(t => t.toLowerCase().includes(texto)))
                );

                filtrados.forEach(item => {
                    const resItem = document.createElement('div');
                    resItem.className = 'res-item';
                    resItem.onclick = () => abrirReproductor(item.id);
                    resItem.innerHTML = `<img src="${item.poster}" loading="lazy"><div class="res-title">${item.titulo}</div>`;
                    resultadosDiv.appendChild(resItem);
                });
            });
        }
    </script>
</body>
</html>
