<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentai - Cinemax</title>

    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --card-bg: #1a1a1a; 
            --skeleton-bg: #222; 
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: #fff; 
            padding-top: 20px; 
            padding-bottom: 100px; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* ANIMACIÓN CARGA */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { 
            background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
            border-radius: 4px;
        }

        .container { padding: 0 15px; }
        .page-header { 
            margin-bottom: 20px; 
            font-size: 22px; 
            font-weight: 900; 
            letter-spacing: -0.5px; 
            border-left: 4px solid var(--accent-color); 
            padding-left: 10px; 
            text-transform: uppercase; 
        }

        /* BUSCADOR MODAL */
        #modal-busqueda { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(20, 20, 20, 0.98); 
            z-index: 3000; 
            padding: 20px; 
            backdrop-filter: blur(15px); 
            overflow-y: auto; 
        }
        .search-box-modal { 
            background: rgba(255,255,255,0.1); 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            margin-top: 40px; 
            margin-bottom: 20px; 
        }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }
        .close-search { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #888; cursor: pointer; border: none; background: none; }
        
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* GRID CATALOGO */
        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .anime-card { 
            position: relative; 
            background: var(--skeleton-bg); 
            border-radius: 4px; 
            overflow: hidden; 
            aspect-ratio: 2 / 3; 
            border: 1px solid rgba(255,255,255,0.03); 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .anime-card:active { transform: scale(0.95); }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.5s ease; }
        
        .etiqueta-top { 
            position: absolute; 
            top: 5px; 
            right: 5px; 
            background: var(--accent-color); 
            color: #fff; 
            font-size: 8px; 
            font-weight: 900; 
            padding: 3px 5px; 
            border-radius: 2px; 
            text-transform: uppercase; 
            z-index: 2; 
        }

        /* MENU INFERIOR (RESUELTO Y UNIFICADO) */
        .bottom-menu { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(0, 0, 0, 0.98); 
            backdrop-filter: blur(20px); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            z-index: 1000; 
            border-top: 1px solid rgba(255, 255, 255, 0.03); 
        }
        .menu-item { 
            text-decoration: none; 
            color: #888; 
            font-size: 10px; 
            font-weight: 500; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: none; 
            border: none; 
            cursor: pointer; 
            width: 25%; 
        }
        .menu-item i { font-size: 19px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="modal-busqueda">
    <button class="close-search" onclick="cerrarBuscador()">&times;</button>
    <div class="search-box-modal">
        <i class="fas fa-search" style="margin-right: 15px; color: #888;"></i>
        <input type="text" id="input-buscador" placeholder="Buscar en el catálogo...">
    </div>
    <div id="resultados-busqueda"></div>
</div>

<div class="container">
    <h2 class="page-header">Catálogo Completo</h2>
    <div class="anime-grid" id="anime-grid"></div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="hentais.html" class="menu-item active"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
    <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sincensura</span></a> 
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="hentaibase.js"></script>

<script>
// Mezclamos la base de datos para que el catálogo se vea diferente cada día
function mezclarPorDia(array) {
    const hoy = new Date().toISOString().slice(0, 10);
    let semilla = hoy.split('-').reduce((a, b) => parseInt(a) + parseInt(b), 0);
    let copia = [...array];
    for (let i = copia.length - 1; i > 0; i--) {
        const j = semilla % (i + 1);
        [copia[i], copia[j]] = [copia[j], copia[i]];
        semilla = (semilla * 9301 + 49297) % 233280;
    }
    return copia;
}

function cargarCatalogo() {
    const grid = document.getElementById("anime-grid");
    if (typeof baseDeDatos === 'undefined') return;

    const datosMezclados = mezclarPorDia(baseDeDatos);

    grid.innerHTML = datosMezclados.map(h => {
        let tagHtml = `<div class="etiqueta-top">${h.tipo}</div>`;
        return `
        <div class="anime-card skeleton" onclick="abrirDetalles('${h.id}')">
            ${tagHtml}
            <img src="${h.poster}" onload="imgLoaded(this)" loading="lazy">
        </div>
        `;
    }).join("");
}

function abrirDetalles(id) {
    localStorage.setItem('hentai_id', id);
    window.location.href = "playhentai.html";
}

function imgLoaded(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

function abrirBuscador() {
    document.getElementById('modal-busqueda').style.display = 'block';
    document.getElementById('input-buscador').focus();
}

function cerrarBuscador() {
    document.getElementById('modal-busqueda').style.display = 'none';
}

document.getElementById('input-buscador').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase().trim();
    const resultadosDiv = document.getElementById('resultados-busqueda');
    resultadosDiv.innerHTML = "";
    if (texto.length < 2) return;

    const filtrados = baseDeDatos.filter(h => h.titulo.toLowerCase().includes(texto));
    filtrados.forEach(h => {
        const item = document.createElement('div');
        item.className = 'anime-card'; // Usamos la misma clase para consistencia
        item.onclick = () => abrirDetalles(h.id);
        item.innerHTML = `
            <img src="${h.poster}" style="width:100%; height:100%; object-fit:cover; opacity:1;">
            <div style="position:absolute; bottom:0; background:rgba(0,0,0,0.8); width:100%; text-align:center; font-size:9px; padding:4px;">${h.titulo}</div>
        `;
        resultadosDiv.appendChild(item);
    });
});

document.addEventListener("DOMContentLoaded", cargarCatalogo);
</script>
</body>
</html>
