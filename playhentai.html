<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor - Cinemax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://pl29062398.profitablecpmratenetwork.com/af/eb/ec/afebec1047ca54166c18910d53e08540.js"></script>

    <style>
        :root { --accent: #e50914; --bg: #0a0a0a; --card-bg: #1f1f1f; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .media-header { position: relative; width: 100%; height: 40vh; background: #000; overflow: hidden; }
        .media-header img { width: 100%; height: 100%; object-fit: cover; }
        .header-shadow { position: absolute; bottom: 0; width: 100%; height: 75%; background: linear-gradient(0deg, var(--bg) 8%, transparent 100%); }
        .back-nav { position: absolute; top: 20px; left: 20px; z-index: 10; color: #fff; font-size: 24px; text-decoration: none; }
        .content { padding: 0 20px 100px; margin-top: -30px; position: relative; z-index: 5; }
        .title { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
        .meta { display: flex; gap: 8px; margin-bottom: 20px; }
        .meta span { background: #252525; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .section-label { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .episode-card { display: flex; align-items: center; background: var(--card-bg); padding: 10px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        .ep-thumb { width: 110px; height: 62px; background: #000; border-radius: 8px; overflow: hidden; margin-right: 15px; position: relative; flex-shrink: 0; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .ep-thumb i { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; }
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.98); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .menu-item { text-decoration: none; color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 25%; }
        .video-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        .video-player.active { display: flex; align-items: center; justify-content: center; }
        .close-v { position: absolute; top: 25px; left: 20px; z-index: 10000; background: rgba(255,255,255,0.2); border:none; color:#fff; width:45px; height:45px; border-radius:50%; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="media-header">
        <a href="index.html" class="back-nav"><i class="fas fa-arrow-left"></i></a>
        <img id="item-bg" src="">
        <div class="header-shadow"></div>
    </div>
    <div class="content">
        <h1 class="title" id="item-title">Cargando...</h1>
        <div class="meta" id="item-meta"></div>
        <p id="item-desc" style="font-size: 14px; color: #b3b3b3; margin-bottom: 30px;"></p>
        <div class="section-label">Episodios</div>
        <div id="episodes-list"></div>
    </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="hentais.html" class="menu-item"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
    <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sincensura</span></a>
    <a href="index.html" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<div class="video-player" id="player">
    <button class="close-v" onclick="stopVideo()"><i class="fas fa-times"></i></button>
    <iframe id="video-frame" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="hentaibase.js"></script>
<script>
    const urlId = localStorage.getItem('hentai_id');
    const item = baseDeDatos.find(h => h.id === urlId);

    // --- CONFIGURACIÓN DE LINKS ---
    const AD_LINK = "https://pl29062398.profitablecpmratenetwork.com/af/eb/ec/afebec1047ca54166c18910d53e08540.js"; 
    const YT_LINK = "https://www.youtube.com/watch?v=0CylWXRK3RA&t=24s"; // LINK NORMAL PARA QUE CUENTE VISITA
    const TIEMPO_BLOQUEO = 5 * 60 * 1000; // 5 minutos

    if(item) {
        document.getElementById("item-title").innerText = item.titulo;
        document.getElementById("item-desc").innerText = item.descripcion;
        document.getElementById("item-bg").src = Array.isArray(item.bg) ? item.bg[0] : (item.bg || item.poster);
        
        const list = document.getElementById("episodes-list");
        const videos = Array.isArray(item.video) ? item.video : [item.video];
        
        videos.forEach((link, index) => {
            list.innerHTML += `
                <div class="episode-card" onclick="gestionarFlujo('${link}')">
                    <div class="ep-thumb">
                        <img src="${Array.isArray(item.bg) ? item.bg[index % item.bg.length] : item.poster}">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="ep-info">Capítulo ${index + 1}</div>
                </div>
            `;
        });
    }

    function gestionarFlujo(urlPelicula) {
        const ahora = Date.now();
        const ultimoBloqueo = parseInt(localStorage.getItem('cinemax_ad_block_time') || 0);
        const clicks = parseInt(localStorage.getItem('cinemax_click_count') || 0);

        // Si estamos en el periodo de 5 minutos, va directo a la película
        if (ahora - ultimoBloqueo < TIEMPO_BLOQUEO) {
            abrirPlayer(urlPelicula);
            return;
        }

        if (clicks === 0) {
            // PRIMER CLIC: DINERO + VISITA YT
            localStorage.setItem('cinemax_click_count', 1);
            
            // 1. Abre publicidad (Tú ganas dinero)
            window.open(AD_LINK, '_blank');
            
            // 2. Abre YouTube en otra pestaña (Tú ganas la visita oficial)
            window.open(YT_LINK, '_blank');
            
            // Avisar al usuario (opcional pero ayuda)
            alert("Cargando servidor... Pulsa de nuevo para ver la película.");
            
        } else {
            // SEGUNDO CLIC: REPRODUCIR PELÍCULA
            localStorage.setItem('cinemax_click_count', 0);
            localStorage.setItem('cinemax_ad_block_time', ahora);
            abrirPlayer(urlPelicula);
        }
    }

    function abrirPlayer(url) {
        const p = document.getElementById("player");
        document.getElementById("video-frame").src = url;
        p.style.display = "flex";
        p.classList.add("active");
        document.body.style.overflow = "hidden";
        window.history.pushState({view: 'player'}, '');
    }

    function stopVideo() {
        const p = document.getElementById("player");
        document.getElementById("video-frame").src = "";
        p.style.display = "none";
        p.classList.remove("active");
        document.body.style.overflow = "auto";
    }

    window.onpopstate = () => stopVideo();
</script>
</body>
</html>
