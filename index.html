<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokigamih - Premium Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #ff0055; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }
        
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); overflow-x:hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Animación Skeleton */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        
        .container { width:100%; padding-bottom:100px; }
        
        /* HEADER ESTILO PARAMOUNT */
        header { 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); 
            position: fixed; width: 100%; z-index: 100;
        }
        header h1 { font-size: 24px; color: var(--accent-color); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; font-family: 'Arial Black', sans-serif;}

        /* HERO ESTILO PARAMOUNT+ (Carrusel de Posters Redondeados) */
        .hero-carousel {
            position: relative; width: 100%; pt: 80px; padding: 90px 0 20px 0;
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 15px; padding-left: 20px; padding-right: 20px;
            scrollbar-width: none;
        }
        .hero-carousel::-webkit-scrollbar { display: none; }
        
        .hero-card {
            flex: 0 0 85%; scroll-snap-align: center;
            position: relative; aspect-ratio: 2/3; max-height: 65vh;
            border-radius: 16px; overflow: hidden; background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .hero-card img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        .hero-card::after { 
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(20,20,20,0.95) 0%, rgba(20,20,20,0.4) 40%, transparent 100%);
        }
        .hero-content { position: absolute; bottom: 5%; left: 5%; width: 90%; z-index: 10; text-align: center; }
        .hero-content h2 { font-size: clamp(18px, 5vw, 28px); font-weight: 900; margin-bottom: 12px; line-height: 1.2; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }
        .hero-btns { display: flex; justify-content: center; gap: 10px; }
        .hero-btns button { 
            background: #ffffff; color: #000; border: none;
            padding: 10px 20px; font-size: 14px; font-weight: 700; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            text-transform: uppercase;
        }
        .hero-btns button.btn-list {
            background: rgba(255,255,255,0.25); color: #fff; backdrop-filter: blur(10px);
        }

        /* SECCIONES */
        #sections-container { margin-top: 10px; position: relative; z-index: 20; }
        .section { margin-bottom: 30px; padding-left: 15px; }
        .section h2 { font-size: 18px; margin-bottom: 15px; font-weight: 700; color: var(--text-color); letter-spacing: -0.3px; }
        
        .scroll-row { display: flex; overflow-x: auto; gap: 14px; padding-bottom: 12px; scrollbar-width: none; padding-right: 20px; }
        .scroll-row::-webkit-scrollbar { display: none; }
        
        .card-item { flex-shrink: 0; cursor: pointer; transition: transform 0.2s; position: relative; display: flex; flex-direction: column; width: 125px; } /* Ancho por defecto */
        .card-item:active { transform: scale(0.95); }
        .img-wrapper { width: 100%; border-radius: 8px; overflow: hidden; background: var(--skeleton-bg); border: 1px solid rgba(255,255,255,0.05); aspect-ratio: 2/3; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }

        .card-title {
            font-size: 12px; color: var(--text-color-sec); margin-top: 6px; text-align: left; padding: 0 2px;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
        }

        /* DISEÑO DE NÚMEROS TOP 10 (DENTRO DE LA IMAGEN, ARRIBA A LA IZQUIERDA) */
        .row-top10 .rank-number {
            position: absolute; 
            left: 8px; 
            top: 8px; 
            font-size: 40px; /* Tamaño reducido para el interior */
            font-weight: 900; 
            font-family: 'Arial Black', sans-serif;
            color: rgba(20, 20, 20, 0.9); /* Ligeramente transparente o negro puro según prefieras */
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; /* Borde más fino para tamaño menor */
            line-height: 1; 
            z-index: 5; 
            pointer-events: none;
        }

        /* BUSCADOR */
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(20, 20, 20, 0.98); z-index: 2000; padding: 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .search-box-modal { background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; padding: 12px 15px; margin-top: 60px; }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; }
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .res-item { background: var(--bg-color-alt); border-radius: 4px; overflow: hidden; aspect-ratio: 2/3; position: relative; }
        .res-item img { width: 100%; height: 100%; object-fit: cover; }
        .res-title { position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.8); color: #fff; font-size: 9px; text-align: center; padding: 4px 0; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MENÚ INFERIOR PREMIUM */
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: var(--text-color-sec); text-decoration: none; font-size: 10px; background: none; border: none; cursor: pointer; width: 25%; font-weight: 500;}
        .menu-item i { font-size: 20px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>KOKIGAMIH</h1></header>

    <div id="modal-busqueda">
        <button onclick="cerrarBuscador()" style="position:absolute; top:20px; right:20px; color:#fff; background:none; border:none; font-size:24px;">&times;</button>
        <div class="search-box-modal">
            <i class="fas fa-search" style="margin-right: 12px; color: var(--text-color-sec);"></i>
            <input type="text" id="input-buscador" placeholder="Buscar en Kokigamih...">
        </div>
        <div id="resultados-busqueda"></div>
    </div>
    
    <!-- CONTENEDOR HERO ESTILO PARAMOUNT DE 5 PORTADAS -->
    <div class="hero-carousel" id="hero-container">
        <!-- Generación dinámica de las 5 portadas en formato vertical -->
    </div>

    <div id="sections-container">
        <div class="section">
            <h2>Agregados recientemente</h2>
            <div class="scroll-row" id="row-recientes"></div>
        </div>

        <div class="section">
            <h2>Más vistos de la semana</h2>
            <div class="scroll-row" id="row-mas-vistos"></div>
        </div>

        <div class="section">
            <h2>Top 10 sin censura</h2>
            <div class="scroll-row row-top10" id="row-sincensura"></div>
        </div>

        <div class="section">
            <h2>Top 10 semanales</h2>
            <div class="scroll-row row-top10" id="row-semanales"></div>
        </div>
    </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item active"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="hentais.html" class="menu-item"><i class="fas fa-layer-group"></i><span>Hentai</span></a>
    <a href="sincensura.html" class="menu-item"><i class="fas fa-eye-slash"></i><span>Sin Censura</span></a>
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="hentaibase.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (typeof baseDeDatos !== 'undefined') {
            window.db = baseDeDatos;
            cargarAppParamount();
        }
    });

    // Utilería para gestionar caché temporal con LocalStorage
    function obtenerDatosCache(clave, tiempoExpiracionMs, generadorDatos) {
        const cache = localStorage.getItem(clave);
        const cacheTime = localStorage.getItem(`${clave}_time`);
        const ahora = Date.now();

        if (cache && cacheTime && (ahora - cacheTime < tiempoExpiracionMs)) {
            return JSON.parse(cache);
        } else {
            const nuevosDatos = generadorDatos();
            localStorage.setItem(clave, JSON.stringify(nuevosDatos));
            localStorage.setItem(`${clave}_time`, ahora);
            return nuevosDatos;
        }
    }

    function cargarAppParamount() {
        // --- LOGICA HERO ---
        const heroContainer = document.getElementById("hero-container");
        const itemsHero = obtenerDatosCache('pm_hero_cache', 24 * 60 * 60 * 1000, () => {
            return [...window.db].sort(() => 0.5 - Math.random()).slice(0, 5).map(i => i.id);
        });

        heroContainer.innerHTML = "";

        itemsHero.forEach(id => {
            const item = window.db.find(x => x.id === id);
            if(item) {
                const card = document.createElement('div');
                card.className = 'hero-card skeleton';
                card.innerHTML = `
                    <img src="${item.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')" loading="lazy">
                    <div class="hero-content">
                        <h2>${item.titulo}</h2>
                        <div class="hero-btns">
                            <button onclick="abrirReproductor('${item.id}')"><i class="fas fa-play"></i> VER AHORA</button>
                            <button class="btn-list"><i class="fas fa-plus"></i> MI LISTA</button>
                        </div>
                    </div>
                `;
                heroContainer.appendChild(card);
            }
        });

        // --- FILA RECIENTES ---
        const rowRecientes = document.getElementById('row-recientes');
        rowRecientes.innerHTML = "";
        [...window.db].reverse().slice(0, 10).forEach(item => {
            rowRecientes.appendChild(crearCardParamount(item, false));
        });

        // --- FILA MÁS VISTOS ---
        const rowMasVistos = document.getElementById('row-mas-vistos');
        rowMasVistos.innerHTML = "";
        const idsMasVistos = obtenerDatosCache('pm_vistos_24h', 24 * 60 * 60 * 1000, () => {
            return [...window.db].sort(() => 0.5 - Math.random()).slice(0, 10).map(i => i.id);
        });
        idsMasVistos.forEach(id => {
            const item = window.db.find(x => x.id === id);
            if(item) rowMasVistos.appendChild(crearCardParamount(item, false));
        });

        // --- FILA TOP 10 SIN CENSURA ---
        const rowSinCensura = document.getElementById('row-sincensura');
        rowSinCensura.innerHTML = "";
        const idsSinCensura = obtenerDatosCache('pm_sincensura_48h', 48 * 60 * 60 * 1000, () => {
            return window.db.filter(item => item.tipo === 'sincensura').sort(() => 0.5 - Math.random()).slice(0, 10).map(i => i.id);
        });
        idsSinCensura.forEach((id, index) => {
            const item = window.db.find(x => x.id === id);
            if(item) rowSinCensura.appendChild(crearCardParamount(item, true, index + 1));
        });

        // --- FILA TOP 10 SEMANALES ---
        const rowSemanales = document.getElementById('row-semanales');
        rowSemanales.innerHTML = "";
        const idsSemanales = obtenerDatosCache('pm_semanales_7d', 7 * 24 * 60 * 60 * 1000, () => {
            return [...window.db].sort(() => 0.5 - Math.random()).slice(0, 10).map(i => i.id);
        });
        idsSemanales.forEach((id, index) => {
            const item = window.db.find(x => x.id === id);
            if(item) rowSemanales.appendChild(crearCardParamount(item, true, index + 1));
        });

        configurarBuscador();
    }

    // Constructor de tarjetas alineado al esquema visual Paramount+
    function crearCardParamount(item, esTop10, numero) {
        const div = document.createElement('div');
        div.className = 'card-item';
        div.onclick = () => abrirReproductor(`${item.id}`);
        
        let imgWrapperContent = `<img src="${item.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')" loading="lazy">`;
        
        // Colocamos el número DENTRO del .img-wrapper para asegurar que quede encapsulado con la imagen
        if (esTop10) {
            imgWrapperContent += `<span class="rank-number">${numero}</span>`;
        }

        div.innerHTML = `
            <div class="img-wrapper skeleton">
                ${imgWrapperContent}
            </div>
            <div class="card-title">${item.titulo}</div>
        `;
        
        return div;
    }

    function abrirReproductor(id) {
        localStorage.setItem('hentai_id', id);
        window.location.href = "playhentai.html";
    }

    function abrirBuscador() { document.getElementById('modal-busqueda').style.display = 'block'; }
    function cerrarBuscador() { document.getElementById('modal-busqueda').style.display = 'none'; }

    function configurarBuscador() {
        const buscador = document.getElementById('input-buscador');
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase().trim();
            const resultadosDiv = document.getElementById('resultados-busqueda');
            resultadosDiv.innerHTML = "";
            if (texto.length < 2) return;
            window.db.filter(item => item.titulo.toLowerCase().includes(texto)).forEach(item => {
                const resItem = document.createElement('div');
                resItem.className = 'res-item';
                resItem.onclick = () => abrirReproductor(`${item.id}`);
                resItem.innerHTML = `<img src="${item.poster}"><div class="res-title">${item.titulo}</div>`;
                resultadosDiv.appendChild(resItem);
            });
        });
    }
</script>
</body>
</html>
