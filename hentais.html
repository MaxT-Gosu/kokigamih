<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentai - Cinemax</title>

    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --card-bg: #1a1a1a; 
            --skeleton-bg: #222; 
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: #fff; 
            padding-top: 20px; 
            padding-bottom: 100px; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* ANIMACIÓN CARGA */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { 
            background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite linear; 
        }

        /* HEADER & BUSCADOR */
        .header {
            padding: 0 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }
        .btn-search {
            background: var(--bg-color-alt);
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* GRID DE CÓMICS/HENTAIS */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 10px;
        }
        @media (min-width: 600px) { .catalog-container { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 900px) { .catalog-container { grid-template-columns: repeat(6, 1fr); } }

        .anime-card {
            aspect-ratio: 2/3;
            background: var(--card-bg);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .anime-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* MODAL DETALLES */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            overflow-y: auto;
        }
        .modal-content { position: relative; padding-bottom: 40px; }
        .close-modal {
            position: fixed;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 20px;
            z-index: 1100;
            cursor: pointer;
        }

        .hero-banner {
            width: 100%;
            height: 50vh;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color), transparent);
        }

        .details-container { padding: 20px; position: relative; margin-top: -60px; }
        .details-title { font-size: 28px; margin-bottom: 10px; font-weight: bold; }
        .details-meta { color: #aaa; margin-bottom: 15px; font-size: 14px; display: flex; gap: 10px; }
        .tag-tipo { background: var(--accent-color); color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .details-desc { line-height: 1.6; color: #ccc; margin-bottom: 25px; font-size: 15px; }

        .btn-play {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        /* MODAL BÚSQUEDA */
        #modal-busqueda {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            display: none;
            padding: 20px;
        }
        .search-input-wrapper { display: flex; gap: 10px; margin-bottom: 20px; }
        #input-buscador {
            flex: 1;
            background: #333;
            border: none;
            padding: 12px;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        /* MENU INFERIOR */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(20,20,20,0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 900;
        }
        .nav-item { color: #888; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: #fff; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 5px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header">
        <h1>CENSURADOS</h1>
        <button class="btn-search" onclick="abrirBuscador()">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <div class="catalog-container" id="catalog-main"></div>

    <div id="modal-detalles" class="modal">
        <button class="close-modal" onclick="cerrarDetalles()">×</button>
        <div class="modal-content" id="modal-content-body"></div>
    </div>

    <div id="modal-busqueda">
        <div class="search-input-wrapper">
            <input type="text" id="input-buscador" placeholder="Buscar hentai censurado...">
            <button onclick="cerrarBuscador()" style="background:none; border:none; color:#fff; font-size:18px;">✕</button>
        </div>
        <div id="resultados-busqueda" class="catalog-container"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Inicio</a>
        <a href="hentais.html" class="nav-item active"><i class="fas fa-video"></i>Censurado</a>
        <a href="sincensura.html" class="nav-item"><i class="fas fa-fire"></i>Sin Censura</a>
        <a href="config.html" class="nav-item"><i class="fas fa-user"></i>Perfil</a>
    </nav>

    <script src="hentaibase.js"></script>
    <script>
        function cargarCatalogo() {
            const container = document.getElementById('catalog-main');
            container.innerHTML = "";
            
            // Filtramos y aplicamos REVERSE para que el último agregado sea el primero
            const filtrados = baseDeDatos.filter(h => h.tipo === "censurado" || h.tipo === "sensurado").reverse();

            filtrados.forEach(h => {
                const card = document.createElement('div');
                card.className = 'anime-card skeleton';
                card.onclick = () => abrirDetalles(h.id);
                card.innerHTML = `<img src="${h.poster}" onload="quitarSkeleton(this)">`;
                container.appendChild(card);
            });
        }

        function abrirDetalles(id) {
            const h = baseDeDatos.find(item => item.id === id);
            if(!h) return;

            const modal = document.getElementById('modal-detalles');
            const content = document.getElementById('modal-content-body');
            const randomBg = h.bg[Math.floor(Math.random() * h.bg.length)];

            content.innerHTML = `
                <div class="hero-banner" style="background-image: url('${randomBg}')"></div>
                <div class="details-container">
                    <h2 class="details-title">${h.titulo}</h2>
                    <div class="details-meta">
                        <span class="tag-tipo">Censurado</span>
                        <span>${h.fecha}</span>
                        <span>${h.estudio}</span>
                    </div>
                    
                    <button class="btn-play" onclick="verVideo('${h.video[0]}')">
                        <i class="fas fa-play"></i> Ver Episodio 1
                    </button>

                    ${h.video.length > 1 ? `
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                            ${h.video.map((v, i) => `
                                <button class="btn-play" style="background:var(--bg-color-alt); color:#fff;" onclick="verVideo('${v}')">
                                    Ep. ${i+1}
                                </button>
                            `).join('')}
                        </div>
                    ` : ''}

                    <p class="details-desc" style="margin-top:20px;">${h.descripcion}</p>
                    <div style="margin-top:20px;">
                        <h3 style="font-size:16px; margin-bottom:10px; color:#888;">Etiquetas</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:8px;">
                            ${h.tags.map(tag => `<span style="background:#333; padding:5px 12px; border-radius:20px; font-size:12px;">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function verVideo(url) { window.location.href = url; }
        function cerrarDetalles() {
            document.getElementById('modal-detalles').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        function quitarSkeleton(img) {
            img.style.opacity = "1";
            img.parentElement.classList.remove("skeleton");
        }
        function abrirBuscador() {
            document.getElementById('modal-busqueda').style.display = 'block';
            document.getElementById('input-buscador').focus();
        }
        function cerrarBuscador() { document.getElementById('modal-busqueda').style.display = 'none'; }

        document.getElementById('input-buscador').addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase().trim();
            const resultadosDiv = document.getElementById('resultados-busqueda');
            resultadosDiv.innerHTML = "";
            if (texto.length < 2) return;

            // Filtramos y aplicamos REVERSE también en la búsqueda
            const filtrados = baseDeDatos.filter(h => 
                (h.tipo === "censurado" || h.tipo === "sensurado") && h.titulo.toLowerCase().includes(texto)
            ).reverse();
            
            filtrados.forEach(h => {
                const item = document.createElement('div');
                item.className = 'anime-card';
                item.onclick = () => abrirDetalles(h.id);
                item.innerHTML = `
                    <img src="${h.poster}" style="width:100%; height:100%; object-fit:cover; opacity:1;">
                    <div style="position:absolute; bottom:0; background:rgba(0,0,0,0.8); width:100%; padding:5px; font-size:10px; text-align:center;">
                        ${h.titulo}
                    </div>
                `;
                resultadosDiv.appendChild(item);
            });
        });

        window.onload = cargarCatalogo;
    </script>
</body>
</html>
